ai_usage_summary: |
  Used Claude for architecture planning, data analysis, and code review.
  All feature engineering and weight calibration are data-driven (validated
  against dataset statistics). No candidate data was fed to any external LLM.
  The ranking step runs entirely offline with no API calls.

methodology_summary: |
  Three-stage CPU ranking pipeline. Stage 1: title + industry + YoE scoring
  reduces 100K to 12K (O(N), ~3s). Stage 2: BM25 over career descriptions
  and MiniLM embeddings over headline+summary combined via Reciprocal Rank
  Fusion reduces to 1K (~5s, uses precomputed index and embeddings). Stage 3:
  full feature matrix across 8 groups — platform signals (28%), career text
  (20%), title/ML-career trajectory (18%), verified assessments (10%),
  industry (8%), GitHub (6%), engagement (5%), education+logistics (5%).
  Weights data-validated against recruiter-behavior proxy signals. Honeypot
  detection requires 2+ impossible-profile signals to avoid false positives.
  Top-10 sanity pass prevents wrong-title candidates from ranking highly.
  Total ranking runtime ~30s on CPU; precomputation ~5min offline.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: false
